name: 🐞 Bug Report
description: File a bug report to help us improve TinyPixels.
title: "[Bug]: "
labels: ["type: bug", "status: needs-triage"]
assignees:
  - PsymoNiko
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report! Please provide as much detail as you can.

  - type: input
    id: contact
    attributes:
      label: Contact Details
      description: How can we get in touch with you if we need more info?
      placeholder: ex. email@example.com
    validations:
      required: false

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear and concise description of what the bug is.
      placeholder: Tell us what you see!
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Provide steps to reproduce the behavior, including the exact command you ran.
      placeholder: |
        1. Run 'tinypixels ./images -q 85'
        2. See error...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: A clear and concise description of what you expected to happen.
    validations:
      required: true

  - type: dropdown
    id: version
    attributes:
      label: TinyPixels Version
      description: What version of TinyPixels are you running? (Run `tinypixels --version`)
      options:
        - latest (from git)
        - 1.0.0
        - 0.9.0
        - older
    validations:
      required: true

  - type: input
    id: python-version
    attributes:
      label: Python Version
      description: What Python version are you using? (`python --version`)
      placeholder: ex. Python 3.9.7
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      description: Which OS are you running TinyPixels on?
      options:
        - Windows
        - macOS
        - Linux
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Please copy and paste any relevant log output (e.g., error messages, compression summary). This will be automatically formatted into code.
      render: shell

  - type: checkboxes
    id: terms
    attributes:
      label: Code of Conduct
      description: By submitting this issue, you agree to follow our [Code of Conduct](https://github.com/PsymoNiko/tinypixels/blob/main/CODE_OF_CONDUCT.md) (if available)
      options:
        - label: I agree to follow this project's Code of Conduct
          required: true