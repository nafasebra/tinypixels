name: 📄 Documentation
description: Report missing, unclear, or outdated documentation.
title: "[Docs]: "
labels: ["type: documentation"]
assignees:
  - PsymoNiko
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping us improve the documentation! Please describe what's missing or unclear.

  - type: dropdown
    id: doc_type
    attributes:
      label: Documentation Type
      description: What type of documentation is this issue about?
      options:
        - README
        - CLI help / man page
        - Installation guide
        - Contributing guide
        - Other
    validations:
      required: true

  - type: textarea
    id: content
    attributes:
      label: What needs to be fixed?
      description: A clear and concise description of what's missing, unclear, or outdated.
    validations:
      required: true

  - type: textarea
    id: location
    attributes:
      label: Location (if known)
      description: Please provide a link or describe where the documentation needs to be updated.
      placeholder: |
        - In the README, under "Installation"
        - https://github.com/PsymoNiko/tinypixels#-cli-usage
    validations:
      required: false

  - type: checkboxes
    id: terms
    attributes:
      label: Code of Conduct
      description: By submitting this issue, you agree to follow our [Code of Conduct](https://github.com/PsymoNiko/tinypixels/blob/main/CODE_OF_CONDUCT.md)
      options:
        - label: I agree to follow this project's Code of Conduct
          required: true